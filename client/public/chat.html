<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dast-Yari Chatbot</title>
</head>

<body>
  <h1>Dast-Yari Chatbot</h1>

  <input id="question" type="text" placeholder="Write your question..." style="width:300px;">
  <button onclick="askBot()">Ask</button>

  <p><strong>Answer:</strong></p>
  <div id="answer"></div>

  <script>
    async function askBot() {
      const question = document.getElementById("question").value;
      const answerBox = document.getElementById("answer");

      answerBox.innerText = "Thinking...";

      try {
        const response = await fetch("/api/dastyari", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            question: question
          })
        });

        const data = await response.json();

        if (data.answer) {
          answerBox.innerText = data.answer;
        } else {
          answerBox.innerText = data.error || "Något gick fel.";
        }
      } catch (err) {
        answerBox.innerText = "Kunde inte kontakta servern.";
      }
    }
  </script>
</body>
</html>
