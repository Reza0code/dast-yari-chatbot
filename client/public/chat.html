<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dast-Yari Chatbot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)),
        url("hands-bg.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #222;
    }

    .page {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
    }

    h1 {
      margin-top: 0;
      font-size: 36px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input {
      flex: 1;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      direction: auto;
      unicode-bidi: plaintext;
    }

    button {
      padding: 14px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #222;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #444;
    }

    .answer-box {
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 16px;
      padding: 18px;
      min-height: 80px;
      white-space: pre-wrap;
      line-height: 1.7;
      direction: auto;
      unicode-bidi: plaintext;
      text-align: start;
    }

    .chat-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 18px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .message {
      padding: 14px 16px;
      border-radius: 16px;
      max-width: 85%;
      white-space: pre-wrap;
      line-height: 1.7;
      direction: auto;
      unicode-bidi: plaintext;
      text-align: start;
    }

    .user-message {
      align-self: flex-end;
      background: rgba(34, 34, 34, 0.88);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot-message {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: #222;
      border-bottom-left-radius: 4px;
    }

    .topics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 18px;
    }

    .topic-button {
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.20);
      color: #222;
      cursor: pointer;
    }

    .topic-button:hover {
      background: rgba(255, 255, 255, 0.35);
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">
      <h1>Dast-Yari Chatbot</h1>

      <p class="subtitle">
        Ask questions about Dast-Yari, our purpose, who we help, and how the project works.
      </p>

      <div class="input-row">
        <input id="question" type="text" placeholder="Write your question..." onkeydown="handleKey(event)">
        <button onclick="askBot()">Ask</button>
      </div>

      <div class="topics">
        <button class="topic-button" onclick="askTopic('Explain Dast-Yari purpose shortly.')">Purpose</button>
        <button class="topic-button" onclick="askTopic('Explain Dast-Yari membership shortly.')">Membership</button>
        <button class="topic-button" onclick="askTopic('Explain Dast-Yari voting rules shortly.')">Voting</button>
        <button class="topic-button" onclick="askTopic('Who does Dast-Yari help?')">Who we help</button>
        <button class="topic-button" onclick="askTopic('Explain Dast-Yari financial transparency shortly.')">Transparency</button>
        <button class="topic-button" onclick="askTopic('How can someone contact Dast-Yari?')">Contact</button>
      </div>

      <div id="chat" class="chat-box">
        <div class="message bot-message">
          Welcome! Ask me about Dast-Yari, membership, values, voting, support rules, or the constitution.
        </div>
      </div>
    </div>
  </div>

  <script>
    function handleKey(event) {
      if (event.key === "Enter") {
        askBot();
      }
    }

    function addMessage(text, type) {
      const chat = document.getElementById("chat");
      const message = document.createElement("div");

      message.className = type === "user"
        ? "message user-message"
        : "message bot-message";

      message.innerText = text;
      chat.appendChild(message);
      chat.scrollTop = chat.scrollHeight;

      return message;
    }

    function askTopic(topicQuestion) {
      const input = document.getElementById("question");
      input.value = topicQuestion;
      askBot();
    }

    async function askBot() {
      const input = document.getElementById("question");
      const question = input.value.trim();

      if (!question) {
        addMessage("Please write a question first.", "bot");
        return;
      }

      addMessage(question, "user");
      input.value = "";

      const thinkingMessage = addMessage("Thinking...", "bot");

      try {
        const response = await fetch("/api/dastyari", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            question: question
          })
        });

        const data = await response.json();

        if (data.answer) {
          thinkingMessage.innerText = data.answer;
        } else {
          thinkingMessage.innerText = data.error || "Något gick fel.";
        }
      } catch (err) {
        thinkingMessage.innerText = "Kunde inte kontakta servern.";
      }
    }
  </script>
</body>
</html>
