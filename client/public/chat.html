<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dast-Yari Chatbot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)),
        url("hands-bg.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #222;
    }

    .page {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
    }

    h1 {
      margin-top: 0;
      font-size: 36px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input {
      flex: 1;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }

    button {
      padding: 14px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #222;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #444;
    }

    .answer-box {
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 16px;
      padding: 18px;
      min-height: 80px;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .label {
      font-weight: bold;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">
      <h1>Dast-Yari Chatbot</h1>

      <p class="subtitle">
        Ask questions about Dast-Yari, our purpose, who we help, and how the project works.
      </p>

      <div class="input-row">
        <input id="question" type="text" placeholder="Write your question..." onkeydown="handleKey(event)">
        <button onclick="askBot()">Ask</button>
      </div>

      <div class="label">Answer:</div>
      <div id="answer" class="answer-box">Your answer will appear here.</div>
    </div>
  </div>

  <script>
    function handleKey(event) {
      if (event.key === "Enter") {
        askBot();
      }
    }

    async function askBot() {
      const question = document.getElementById("question").value.trim();
      const answerBox = document.getElementById("answer");

      if (!question) {
        answerBox.innerText = "Please write a question first.";
        return;
      }

      answerBox.innerText = "Thinking...";

      try {
        const response = await fetch("/api/dastyari", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            question: question
          })
        });

        const data = await response.json();

        if (data.answer) {
          answerBox.innerText = data.answer;
        } else {
          answerBox.innerText = data.error || "Något gick fel.";
        }
      } catch (err) {
        answerBox.innerText = "Kunde inte kontakta servern.";
      }
    }
  </script>
</body>
</html>
